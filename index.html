<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <!-- إعدادات وقت التشغيل: روابط API والنطاقات (قابلة للتعديل على السيرفر) -->
    <script src="/runtime-config.js"></script>

    <link rel="icon" type="image/png" href="/logo-parent.png?v=5" />
    <link rel="apple-touch-icon" href="/logo-parent.png?v=5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" id="itc-theme-color" content="#0E0F14" />
    <meta name="color-scheme" id="itc-color-scheme" content="dark" />

    <!--
      تطبيق وضع الألوان واللغة قبل الـ render لتجنّب وميض (FOUC).
      الترتيب: تفضيل المستخدم (localStorage) → افتراضي.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('itc-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          var root = document.documentElement;
          if (theme === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
          var meta = document.getElementById('itc-theme-color');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0E0F14' : '#D4D8DE');
          var scheme = document.getElementById('itc-color-scheme');
          if (scheme) scheme.setAttribute('content', theme);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
        try {
          var savedLocale = localStorage.getItem('itc-locale');
          var locale = savedLocale === 'en' || savedLocale === 'ar'
            ? savedLocale
            : ((navigator.language || '').toLowerCase().indexOf('en') === 0 ? 'en' : 'ar');
          document.documentElement.setAttribute('lang', locale);
          document.documentElement.setAttribute('dir', locale === 'ar' ? 'rtl' : 'ltr');
        } catch (e) {
          document.documentElement.setAttribute('lang', 'ar');
          document.documentElement.setAttribute('dir', 'rtl');
        }
        // تمييز واجهة الشركات عن الشركة الأم (عنوان، أيقونة، ثيم)
        try {
          var cfg = window.__ITC_CONFIG__ || {};
          var companyHost = cfg.companyHost || 'iraqitradecenter_company.gcc.iq';
          var suffix = cfg.companyDomainSuffix || '.iraqi-trade-center.iq';
          var host = window.location.hostname;
          var sub = host.endsWith(suffix) ? host.slice(0, host.length - suffix.length) : '';
          var isCompany = host === companyHost ||
            (sub.length > 0 && sub.indexOf('.') === -1);
          if (isCompany) {
            document.documentElement.classList.add('theme-company');
            document.title = 'مركز التجارة العراقي - لوحة الشركة';
            var setMeta = function (name, val) {
              var el = document.querySelector('meta[name="' + name + '"]');
              if (el) el.setAttribute('content', val);
            };
            setMeta('application-name', 'مركز التجارة العراقي - لوحة الشركة');
            setMeta('apple-mobile-web-app-title', 'لوحة الشركة');
            var icon = document.querySelector('link[rel="icon"]');
            var apple = document.querySelector('link[rel="apple-touch-icon"]');
            if (icon) icon.setAttribute('href', '/logo.png?v=5');
            if (apple) apple.setAttribute('href', '/logo.png?v=5');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>

    <!-- PWA meta -->
    <meta name="application-name" content="مركز التجارة العراقي — الشركة الأم" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="الشركة الأم" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>الشركة الأم — مركز التجارة العراقي</title>

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
